@if (isSimulation) {
<div class="page">
  <div class="configContainer">
    <span class="containerTitle">Simulation Configurations</span>
    <div class="configOption">
      <span class="configTitle">Noise Generator</span>
      <mat-radio-group 
      (change)="updateNoiseGenerator($event.value)"
      [formControl]="noiseGeneratorControl">
        <mat-radio-button value="white noise">White noise</mat-radio-button>
        <mat-radio-button value="simplex">Simplex</mat-radio-button>
        <mat-radio-button value="fractal">Fractal</mat-radio-button>
      </mat-radio-group>
    </div>
    <div class="configOption">
      <span class="configTitle">Maximum Frame Rate</span>
      <mat-slider
        min="8"
        max="244"
        step="8">
        <input matSliderThumb [formControl]="fpsControl" (change)="updateTargetFPS(+fpsControl.value!)">
      </mat-slider>
    </div>
    <div class="configOption">
      <span class="configTitle">Background Color</span>
      <input type="color">
    </div>
  </div>
  <div class="configContainer">
    <span class="containerTitle">Ruleset Configurations</span>
    <div class="configOption">
      <span class="configTitle">Noise Generator</span>
      
    </div>
  </div>
</div>
}
