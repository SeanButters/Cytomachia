@if (isSimulation) {
<div class="page">
  <div class="configContainer">
    <span class="containerTitle">Simulation Configurations</span>
    <div class="configOption">
      <span class="configTitle">Noise Generator</span>
      <mat-radio-group 
      (change)="updateNoiseGenerator($event.value)"
      [formControl]="noiseGeneratorControl">
        <mat-radio-button value="white noise">White noise</mat-radio-button>
        <mat-radio-button value="simplex">Simplex</mat-radio-button>
        <mat-radio-button value="fractal">Fractal</mat-radio-button>
      </mat-radio-group>
    </div>
    <div class="configOption">
      <span class="configTitle">Maximum Frame Rate</span>
      <mat-slider
        min="8"
        max="244"
        step="8">
        <input matSliderThumb [formControl]="fpsControl" (dragEnd)="updateTargetFPS(fpsControl.value!)">
      </mat-slider>
    </div>
    <div class="configOption">
      <span class="configTitle">Background Color</span>
      <div id="backgroundColorPicker" #backgroundColorPicker></div>
      <div>
        <span>Hex Color: </span>
        <input type="text" [formControl]="backgroundColorControl">
        <button 
          matButton
          matTooltip="Randomize cell color"
          (click)="randomizeBackgroundColor()">
          <mat-icon fontIcon="casino"></mat-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="configContainer">
    <span class="containerTitle">Ruleset Configurations</span>
    <div class="configOption">
      <span class="configTitle">Cell Color</span>
      <div id="foregroundColorPicker" #foregroundColorPicker></div>
      <div>
        <span>Hex Color: </span>
        <input type="text" [formControl]="foregroundColorControl">
        <button 
          matButton
          matTooltip="Randomize cell color"
          (click)="randomizeForegroundColor()">
          <mat-icon fontIcon="casino"></mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
}
