<div class="theatre" [class.compact]="isCompact">
  <div class="player">
    <canvas #canvas class="camera"></canvas>
    <div class="playerButtons">
      <div class="buttonRow">
        <button 
          matButton
          [matTooltip]="isPaused? 'Start/Resume simulation' : 'Pause simulation'"
          (click)="pauseLoop()">
          <mat-icon [fontIcon]="isPaused ? 'play_arrow' : 'pause'"></mat-icon>
        </button>
        <button 
          matButton
          matTooltip="Step once"
          (click)="stepOnce()">
          <mat-icon fontIcon="skip_next"></mat-icon>
        </button>
      </div>
      <div class="buttonRow">
        <button 
          matButton
          matTooltip=""
          (click)="zoomInOut(false)">
          <mat-icon fontIcon="zoom_out"></mat-icon>
        </button> 
        <button 
          matButton
          matTooltip=""
          (click)="zoomInOut(true)">
          <mat-icon fontIcon="zoom_in"></mat-icon>
        </button>
        <button 
          matButton
          [matTooltip]="isCompact? 'Expand View' : 'Compact View'"
          (click)="toggleCompactMode()">
          <mat-icon [fontIcon]="isCompact ? 'fullscreen' : 'fullscreen_exit'"></mat-icon>
        </button>       
      </div>
    </div>
  </div>
</div>
